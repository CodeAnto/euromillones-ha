<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
    <title>Euromillones — stack-anto</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; padding: 0; min-height: 100%; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        color: #f1f5f9;
        /* Dark limpio: halos esmeralda + oro muy sutiles sobre navy profundo */
        background:
          radial-gradient(1000px 560px at 12% -10%, rgba(16,185,129,0.10), transparent 60%),
          radial-gradient(900px 520px at 100% 0%, rgba(251,191,36,0.07), transparent 58%),
          #060912;
        background-attachment: fixed;
        overflow-x: hidden;
      }
      .light-mode body { color: #0f172a; }

      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 5px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }
      ::selection { background: rgba(16,185,129,0.35); color: #fff; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
